<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>橙色缺口圆 - Border 实现</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f0f0;
        }

        .circle {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: #FF8C00;
            position: relative;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        /* 用 border + 旋转 + 伪元素做出缺口 */
        .circle::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: #f0f0f0;   /* 和页面背景同色 */
            transform: rotate(45deg);   /* 控制缺口角度 */
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="circle"></div>
</body>
</html>
